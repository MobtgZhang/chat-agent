<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { background: transparent !important; overflow: hidden; color: #DBDEE1; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; word-wrap: break-word; }
    #content { padding: 4px; color: inherit; }
    #content pre { background: #1e1f22; border-radius: 6px; padding: 12px; overflow-x: auto; margin: 8px 0; }
    #content code { font-family: ui-monospace, monospace; font-size: 0.9em; }
    #content pre code { background: transparent; padding: 0; }
    #content p { margin: 6px 0; }
    #content ul, #content ol { margin: 6px 0; padding-left: 24px; }
    #content blockquote { border-left: 4px solid #5865F2; margin: 8px 0; padding-left: 16px; color: #949BA4; }
    #content table { border-collapse: collapse; margin: 8px 0; }
    #content th, #content td { border: 1px solid #3F4147; padding: 6px 10px; }
    #content a { color: #5865F2; text-decoration: none; }
    #content a:hover { text-decoration: underline; }
    /* KaTeX 数学公式继承文字颜色，避免默认黑色 */
    #content .katex, #content .katex * { color: inherit !important; }
  </style>
</head>
<body>
  <div id="content"></div>
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" crossorigin></script>
  <script>
    function renderContent(md, textColor, fontSize) {
      const el = document.getElementById('content');
      if (!el) return;
      el.innerHTML = marked.parse(md || '', { gfm: true, breaks: true });
      try {
        renderMathInElement(el, {
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false},
            {left: '\\[', right: '\\]', display: true},
            {left: '\\(', right: '\\)', display: false}
          ],
          throwOnError: false
        });
      } catch (e) {}
      el.style.color = textColor || '#DBDEE1';
      el.style.fontSize = (fontSize || 14) + 'px';
    }
  </script>
</body>
</html>
