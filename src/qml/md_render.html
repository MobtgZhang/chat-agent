<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="qrc:/src/qml/md_libs/katex.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { background: transparent !important; overflow: hidden; color: #E4E6EB; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif; line-height: 1.65; word-wrap: break-word; }
    #content { padding: 6px 2px; color: inherit; font-size: 14px; }

    /* ── Dark 主题：代码块 ── */
    #content .code-bubble-wrapper {
      position: relative;
      margin: 12px 0;
      padding: 3px;
      background: rgba(99, 102, 241, 0.12);
      border: 1px solid rgba(99, 102, 241, 0.22);
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    #content .code-bubble-inner {
      background: #1F2937;
      border-radius: 10px;
      padding: 14px 48px 14px 14px;
      overflow-x: auto;
      border: 1px solid #374151;
    }
    #content .code-bubble-inner pre { margin: 0; padding: 0; background: transparent; }
    #content .code-copy-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 8px;
      background: rgba(99, 102, 241, 0.25);
      color: #9CA3AF;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
      z-index: 2;
    }
    #content .code-copy-btn:hover {
      background: rgba(99, 102, 241, 0.4);
      color: #E5E7EB;
    }
    #content .code-copy-btn.copied { color: #34D399; }

    #content code { font-family: "SF Mono", "Fira Code", "Consolas", ui-monospace, monospace; font-size: 0.92em; }
    #content pre code { background: transparent; padding: 0; }
    #content pre {
      background: #1F2937;
      border-radius: 8px;
      padding: 14px 16px;
      overflow-x: auto;
      margin: 10px 0;
      border: 1px solid #374151;
    }
    #content p { margin: 8px 0; }
    #content ul, #content ol { margin: 8px 0; padding-left: 26px; }
    #content blockquote {
      border-left: 4px solid #6366F1;
      margin: 10px 0;
      padding-left: 18px;
      color: #9CA3AF;
    }

    /* 表格 */
    #content .table-wrapper { overflow-x: auto; margin: 12px 0; -webkit-overflow-scrolling: touch; }
    #content table { border-collapse: collapse; margin: 0; min-width: 200px; width: auto; }
    #content th, #content td { border: 1px solid #4B5563; padding: 10px 14px; text-align: left; }
    #content th { background: rgba(99, 102, 241, 0.18); font-weight: 600; color: inherit; }
    #content tbody tr:nth-child(even) { background: rgba(255,255,255,0.04); }

    #content a { color: #818CF8; text-decoration: none; }
    #content a:hover { text-decoration: underline; }

    /* KaTeX */
    #content .katex, #content .katex * { color: inherit !important; }

    /* ── Light 主题 ── */
    #content.theme-light .code-bubble-wrapper {
      background: rgba(79, 70, 229, 0.08);
      border-color: rgba(79, 70, 229, 0.2);
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    #content.theme-light .code-bubble-inner {
      background: #F8FAFC !important;
      border-color: #E2E8F0 !important;
      color: #1E293B !important;
    }
    #content.theme-light .code-bubble-inner pre,
    #content.theme-light .code-bubble-inner code { color: #1E293B !important; background: transparent !important; }
    #content.theme-light .code-copy-btn { color: #64748B !important; }
    #content.theme-light .code-copy-btn:hover { color: #1E293B !important; }
    #content.theme-light pre {
      background: #F8FAFC !important;
      border: 1px solid #E2E8F0;
      color: #1E293B !important;
    }
    #content.theme-light blockquote { color: #64748B !important; border-left-color: #4F46E5; }
    #content.theme-light th, #content.theme-light td { border-color: #E2E8F0 !important; color: inherit; }
    #content.theme-light th { background: rgba(79, 70, 229, 0.1) !important; }
    #content.theme-light tbody tr:nth-child(even) { background: rgba(0,0,0,0.02) !important; }
    #content.theme-light a { color: #4F46E5; }
  </style>
</head>
<body>
  <div id="content"></div>
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script src="qrc:/src/qml/md_libs/marked.min.js"></script>
  <script src="qrc:/src/qml/md_libs/katex.min.js"></script>
  <script src="qrc:/src/qml/md_libs/contrib/auto-render.min.js"></script>
  <script>
    // 先把 LaTeX 数学块从 Markdown 文本中摘出来，避免被 marked 误处理
    // （尤其是公式里的下划线、星号等会被当成 Markdown 语法）
    function extractMathSegments(src) {
      const text = src || '';
      const segments = [];
      let out = '';
      let i = 0;
      let id = 0;

      function pushSegment(type, content) {
        const token = '§§MATH_' + (id++) + '§§';
        segments.push({ token, type, content });
        return token;
      }

      while (i < text.length) {
        // $$ ... $$
        if (text[i] === '$' && text[i + 1] === '$') {
          let j = i + 2;
          while (j < text.length && !(text[j] === '$' && text[j + 1] === '$')) {
            j++;
          }
          if (j < text.length) {
            const content = text.slice(i, j + 2); // 保留定界符，交给 KaTeX 解析
            out += pushSegment('block', content);
            i = j + 2;
            continue;
          }
        }

        // \[ ... \]
        if (text[i] === '\\' && text[i + 1] === '[') {
          let j = i + 2;
          while (j < text.length && !(text[j] === '\\' && text[j + 1] === ']')) {
            j++;
          }
          if (j < text.length) {
            const content = text.slice(i, j + 2);
            out += pushSegment('block', content);
            i = j + 2;
            continue;
          }
        }

        // $ ... $ （简单处理：不跨行，避免和普通 $ 冲突）
        if (text[i] === '$') {
          let j = i + 1;
          let hasContent = false;
          while (j < text.length && text[j] !== '\n' && text[j] !== '\r' && text[j] !== '$') {
            if (!/\s/.test(text[j])) hasContent = true;
            j++;
          }
          if (j < text.length && text[j] === '$' && hasContent) {
            const content = text.slice(i, j + 1);
            out += pushSegment('inline', content);
            i = j + 1;
            continue;
          }
        }

        // \(...\)
        if (text[i] === '\\' && text[i + 1] === '(') {
          let j = i + 2;
          while (j < text.length && !(text[j] === '\\' && text[j + 1] === ')')) {
            j++;
          }
          if (j < text.length) {
            const content = text.slice(i, j + 2);
            out += pushSegment('inline', content);
            i = j + 2;
            continue;
          }
        }

        out += text[i];
        i++;
      }

      return { text: out, segments };
    }

    // Markdown 渲染后，把占位符替换回原来的 LaTeX 字符串，再交给 KaTeX 处理
    function restoreMathInDom(rootEl, segments) {
      if (!segments || !segments.length || !rootEl) return;
      const walker = document.createTreeWalker(rootEl, NodeFilter.SHOW_TEXT, null, false);
      const byToken = Object.create(null);
      for (const seg of segments) byToken[seg.token] = seg.content;

      const toReplace = [];
      while (true) {
        const node = walker.nextNode();
        if (!node) break;
        const text = node.nodeValue;
        if (text && text.indexOf('§§MATH_') !== -1) {
          toReplace.push(node);
        }
      }

      for (const node of toReplace) {
        let text = node.nodeValue;
        const frag = document.createDocumentFragment();
        let lastIndex = 0;
        const re = /§§MATH_\d+§§/g;
        let m;
        while ((m = re.exec(text)) !== null) {
          if (m.index > lastIndex) {
            frag.appendChild(document.createTextNode(text.slice(lastIndex, m.index)));
          }
          const token = m[0];
          const span = document.createElement('span');
          span.textContent = byToken[token] || '';
          frag.appendChild(span);
          lastIndex = m.index + token.length;
        }
        if (lastIndex < text.length) {
          frag.appendChild(document.createTextNode(text.slice(lastIndex)));
        }
        node.parentNode.replaceChild(frag, node);
      }
    }

    function renderContent(md, textColor, fontSize, isLight) {
      const el = document.getElementById('content');
      if (!el) return;

      const extracted = extractMathSegments(md || '');
      el.innerHTML = marked.parse(extracted.text, {
        gfm: true,
        breaks: true
      });

      // 替换回原始的 LaTeX 文本，再由 KaTeX 解析，避免 Markdown 破坏公式
      restoreMathInDom(el, extracted.segments);

      try {
        renderMathInElement(el, {
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false},
            {left: '\\[', right: '\\]', display: true},
            {left: '\\(', right: '\\)', display: false}
          ],
          throwOnError: false
        });
      } catch (e) {
        // 忽略单次渲染错误，避免影响整体显示
      }

      el.style.color = textColor || '#DBDEE1';
      el.style.fontSize = (fontSize || 14) + 'px';
      el.classList.toggle('theme-light', !!isLight);

      // 为代码块添加气泡样式和复制按钮
      enhanceCodeBlocks(el);
      // 为表格添加横向滚动包装
      enhanceTables(el);
    }

    function enhanceTables(rootEl) {
      const tables = rootEl.querySelectorAll('table');
      tables.forEach(tbl => {
        if (tbl.closest('.table-wrapper')) return;
        const wrapper = document.createElement('div');
        wrapper.className = 'table-wrapper';
        tbl.parentNode.insertBefore(wrapper, tbl);
        wrapper.appendChild(tbl);
      });
    }

    const copyIconSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';

    // 初始化 Qt WebChannel（用于调用 C++ 剪贴板，WebEngine 沙箱中 clipboard API 不可用）
    window.qtClipboard = null;
    if (typeof qt !== 'undefined' && qt.webChannelTransport) {
      new QWebChannel(qt.webChannelTransport, function(channel) {
        window.qtClipboard = channel.objects.clipboard;
      });
    }

    function copyToClipboard(text) {
      if (window.qtClipboard && typeof window.qtClipboard.copyToClipboard === 'function') {
        window.qtClipboard.copyToClipboard(text);
        return;
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text);
        return;
      }
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } finally { ta.remove(); }
    }

    function enhanceCodeBlocks(rootEl) {
      const pres = rootEl.querySelectorAll('pre');
      pres.forEach(pre => {
        if (pre.closest('.code-bubble-wrapper')) return;
        const codeEl = pre.querySelector('code');
        const codeText = (codeEl || pre).textContent;

        const wrapper = document.createElement('div');
        wrapper.className = 'code-bubble-wrapper';

        const inner = document.createElement('div');
        inner.className = 'code-bubble-inner';
        inner.appendChild(pre.cloneNode(true));

        const btn = document.createElement('button');
        btn.className = 'code-copy-btn';
        btn.type = 'button';
        btn.innerHTML = copyIconSvg;
        btn.title = '复制';
        btn.onclick = () => {
          copyToClipboard(codeText);
          btn.classList.add('copied');
          setTimeout(() => btn.classList.remove('copied'), 800);
        };

        wrapper.appendChild(inner);
        wrapper.appendChild(btn);
        pre.parentNode.replaceChild(wrapper, pre);
      });
    }
  </script>
</body>
</html>
